<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="60" ry="40" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Head -->
  <circle cx="100" cy="90" r="40" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Ears -->
  <path d="M80,60 q-10,-30 0,-40 t20,0 q10,30 0,40 z" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <path d="M120,60 q10,-30 0,-40 t-20,0 q-10,30 0,40 z" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="85" cy="85" r="5" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="115" cy="85" r="5" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="85" cy="85" r="2" fill="#333"/>
  <circle cx="115" cy="85" r="2" fill="#333"/>
  <!-- Nose -->
  <path d="M95,100 q5,5 10,0 t10,0 q5,-5 10,0" fill="#ff9999" stroke="#333" stroke-width="1"/>
  <!-- Whiskers -->
  <line x1="70" y1="100" x2="50" y2="95" stroke="#333" stroke-width="1"/>
  <line x1="70" y1="100" x2="50" y2="100" stroke="#333" stroke-width="1"/>
  <line x1="70" y1="100" x2="50" y2="105" stroke="#333" stroke-width="1"/>
  <line x1="130" y1="100" x2="150" y2="95" stroke="#333" stroke-width="1"/>
  <line x1="130" y1="100" x2="150" y2="100" stroke="#333" stroke-width="1"/>
  <line x1="130" y1="100" x2="150" y2="105" stroke="#333" stroke-width="1"/>
  <!-- Tail -->
  <path d="M160,120 q30,-20 40,10 t10,30 q-10,10 -20,5 t-30,-10 q-20,-10 -30,10" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
</svg>